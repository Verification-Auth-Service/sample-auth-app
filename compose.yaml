services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    build:
      context: .
      dockerfile: ./apps/packages/db/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://app:app@db:3306/app
    restart: "no"

  db-resource-migrate:
    build:
      context: .
      dockerfile: ./apps/packages/db-resource/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://app:app@db:3306/app
    restart: "no"

  react-router-auth-sample:
    build:
      context: .
      dockerfile: ./apps/auth-app/Dockerfile
      target: dev-env
    ports:
      - "5173:5173"
    env_file:
      - ./apps/auth-app/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://app:app@db:3306/app
      PORT: "5173"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/auth-app/node_modules
      - /app/apps/packages/db/node_modules

volumes:
  db_data:
