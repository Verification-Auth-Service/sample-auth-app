services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    build:
      context: .
      dockerfile: ./apps/packages/db/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://app:app@db:3306/app
    restart: "no"

  db-resource-migrate:
    build:
      context: .
      dockerfile: ./apps/packages/db-resource/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://app:app@db:3306/app
    restart: "no"

  react-router-auth-sample:
    build:
      context: .
      dockerfile: ./apps/auth-app/Dockerfile
      target: dev-env
    ports:
      - "5173:5173"
    env_file:
      - ./apps/auth-app/.env
    depends_on:
      db:
        condition: service_healthy
      resource-server-sample:
        condition: service_started
    environment:
      DATABASE_URL: mysql://app:app@db:3306/app
      PORT: "5173"
      RESOURCE_SERVER_BASE_URL: http://resource-server-sample:5174
      RESOURCE_OAUTH_AUTHORIZE_URL: http://localhost:5174/oauth/authorize
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/auth-app/node_modules
      - /app/apps/packages/db/node_modules

  resource-server-sample:
    build:
      context: .
      dockerfile: ./apps/resource-server/Dockerfile
      target: dev-env
    ports:
      - "5174:5174"
    depends_on:
      db:
        condition: service_healthy
      db-resource-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: mysql://app:app@db:3306/app
      PORT: "5174"
      RESOURCE_OAUTH_REDIRECT_URI: http://localhost:5173/auth/resource/callback
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/resource-server/node_modules
      - /app/apps/packages/db-resource/node_modules

volumes:
  db_data:
