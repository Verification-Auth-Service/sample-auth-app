name: Auth App CI

on:
  push:
    paths:
      - ".github/workflows/auth-app-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/auth-app/**"
      - "apps/packages/db/**"
  pull_request:
    paths:
      - ".github/workflows/auth-app-ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/auth-app/**"
      - "apps/packages/db/**"

jobs:
  auth-app:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/app
      SESSION_SECRET: ci-session-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir apps/packages/db generate

      - name: Typecheck auth app
        run: pnpm --dir apps/auth-app typecheck

      - name: Run auth app tests
        run: pnpm --dir apps/auth-app test -- --run

      - name: Build auth app
        run: pnpm --dir apps/auth-app build
